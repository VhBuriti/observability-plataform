<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas id="myCanvas" width="400" height="400"></canvas>

    <h3>Hello, World!</h3>

    <style>
      #myCanvas {
        border: 1px solid red;
      }
    </style>

    <script>
      console.log("Hello, World!");
      const myCanvas = document.getElementById("myCanvas");
      const canvasContext = myCanvas.getContext("2d");
      const clicks = [];
      console.log("Canvas context:", canvasContext);
      document.addEventListener("click", (event) => {

        // should emit an event for a backend for processing
        clicks.push({ x: event.clientX, y: event.clientY });
        console.log("Document clicked!");
        console.log("X:", event.clientX, "Y:", event.clientY);
        canvasContext.fillStyle = "blue";

        console.log("clicks: ", clicks);

        clicks.forEach((click) => {
          canvasContext.fillRect(click.x - 5, click.y - 5, 10, 10);
        });
      });
    </script>
    <script src="./index.js"></script>
  </body>
</html>
